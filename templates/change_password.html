{% extends 'base.html' %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:85vh;">
    <div class="auth-box bg-white p-5 border-0 shadow-lg rounded-4" style="max-width: 480px; width: 100%;">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="fas fa-user-shield text-primary fa-3x"></i>
            </div>
            <h3 class="fw-bold text-dark">Change Password</h3>
            <p class="text-muted small">Update your account password to keep your profile secure.</p>
        </div>

        {% include "alerts.html" %}

        <form action="{% url 'change_password' %}" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label small fw-bold">Current Password</label>
                <div class="input-group shadow-sm rounded">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-key text-muted"></i></span>
                    <input type="password" name="current_password" class="form-control border-start-0" placeholder="Enter current password" required>
                </div>
            </div>

            <hr class="my-4 text-muted opacity-25">

            <div class="mb-3">
                <label class="form-label small fw-bold">New Password</label>
                <div class="input-group shadow-sm rounded">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="new_password" class="form-control border-start-0" placeholder="Create new password" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Confirm New Password</label>
                <div class="input-group shadow-sm rounded">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-check-double text-muted"></i></span>
                    <input type="password" name="confirm_password" class="form-control border-start-0" placeholder="Repeat new password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm transition-hover">
                Update Password
            </button>
            

            {% if user.role == 'Job Seeker' %}
                <div class="text-center mt-4 pt-3 border-top">
                    <a href="{% url 'seeker_dashboard' %}" class="btn btn-secondary ">
                        <i class="fas fa-chevron-left me-1"></i> Back to Dashboard
                    </a>
                </div>
            {% else %}
                <div class="text-center mt-4 pt-3 border-top">
                    <a href="{% url 'recruiter_dashboard' %}" class="btn btn-secondary ">
                        <i class="fas fa-chevron-left me-1"></i> Back to Dashboard
                    </a>
                </div>
            {% endif %}
        </form>
    </div>
</div>

<style>
    .auth-box .form-control {
        font-size: 0.95rem;
        padding: 0.75rem;
    }
    .auth-box .form-control:focus {
        box-shadow: none;
        border-color: #dee2e6;
    }
    .auth-box .input-group-text {
        padding-left: 1.2rem;
    }
    .transition-hover:hover {
        transform: translateY(-2px);
        transition: all 0.3s ease;
    }
    .hover-dark:hover {
        color: #212529 !important;
        transition: color 0.2s ease-in-out;
    }
</style>

{% endblock %}
