{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Job Details</h5>
                </div>
                <div class="card-body p-4">
                    <form action="{% url 'edit_job' job.id %}" method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Job Title</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-heading"></i></span>
                                {{ form.title }}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Job Description</label>
                            {{ form.description }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Key Requirements</label>
                            {{ form.requirement }}
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Location</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-map-marker-alt"></i></span>
                                    {{ form.job_location }}
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Salary (LPA)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-indian-rupee-sign"></i></span>
                                    {{ form.job_salary }}
                                </div>
                            </div>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'recruiter_dashboard' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5 fw-bold">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
