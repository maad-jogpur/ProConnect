 {% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="mb-4">Apply for {{ job.title }}</h3>

        <form action="{%url 'apply_job' job.id%}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Upload Resume</label>
                <input type="file" name="resume" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cover Letter</label>
                <textarea name="cover_letter" class="form-control" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn btn-success">
                Submit Application
            </button>
            <a href="{% url 'job_detail' job.id %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>

{% endblock %}
