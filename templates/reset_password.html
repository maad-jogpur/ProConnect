{% extends 'base.html' %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:85vh;">
    <div class="auth-box bg-white p-5 border-0 shadow-lg rounded-4" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="fas fa-key text-primary fa-3x"></i>
            </div>
            <h3 class="fw-bold text-dark">Set New Password</h3>
            <p class="text-muted small">Please enter a strong password to secure your account.</p>
        </div>

        {% include "alerts.html" %}

        <form action="" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label small fw-bold">New Password</label>
                <div class="input-group shadow-sm rounded">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="Create new password" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Confirm New Password</label>
                <div class="input-group shadow-sm rounded">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-check-double text-muted"></i></span>
                    <input type="password" name="confirm_password" class="form-control border-start-0" placeholder="Repeat new password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm transition-hover">
                Reset Password
            </button>
        </form>
    </div>
</div>

<style>
    /* Consistent HireHub Auth Styling */
    .auth-box .form-control {
        font-size: 0.95rem;
        padding: 0.75rem;
    }
    .auth-box .form-control:focus {
        box-shadow: none;
        border-color: #dee2e6;
    }
    .auth-box .input-group-text {
        padding-left: 1.2rem;
    }
    .transition-hover:hover {
        transform: translateY(-2px);
        transition: all 0.3s ease;
    }
</style>

{% endblock %}
