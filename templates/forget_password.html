{% extends 'base.html' %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:85vh;">
    <div class="auth-box bg-white p-5 border-0 shadow-lg rounded-4" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="fas fa-lock-open text-primary fa-3x"></i>
            </div>
            <h3 class="fw-bold text-dark">Forgot Password?</h3>
            <p class="text-muted small">Enter your email address below and we'll send you a link to reset your password.</p>
        </div>

        {% include "alerts.html" %}

        <form action="{% url 'forget_password' %}" method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label small fw-bold">Email Address</label>
                <div class="input-group shadow-sm rounded">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" name="email" class="form-control border-start-0" placeholder="Enter your registered email" required>
                </div>
               
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm transition-hover">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-4 border-top pt-3 small">
            <a href="{% url 'login' %}" class="text-decoration-none fw-bold">
                <i class="fas fa-arrow-left me-1"></i> Back to Login
            </a>
        </div>
    </div>
</div>

<style>
    /* Styling to match the HireHub auth suite */
    .auth-box .form-control {
        font-size: 0.95rem;
        padding: 0.75rem;
    }
    .auth-box .form-control:focus {
        box-shadow: none;
        border-color: #dee2e6;
    }
    .auth-box .input-group-text {
        padding-left: 1.2rem;
    }
    .transition-hover:hover {
        transform: translateY(-2px);
        transition: all 0.3s ease;
    }
</style>

{% endblock %}
